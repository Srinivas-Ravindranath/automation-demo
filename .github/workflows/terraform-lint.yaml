name: Terraform Lint and Security Check

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-and-security:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: '1.5.0'  # Adjust as needed

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: 'terraform/'

      - name: Run tfsec security scan
        uses: aquasecurity/tfsec-action@v1  # Use the appropriate version tag
        with:
          working-directory: 'terraform/'  # Adjust if your Terraform code is elsewhere